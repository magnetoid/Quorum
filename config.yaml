tiers:
  local:
    models: [ollama/llama3.2, ollama/qwen2.5-coder]
    confidence_threshold: 0.75
  cheap:
    models: [gemini-flash, gpt-4o-mini]
    confidence_threshold: 0.85
  premium:
    models: [claude-opus-4, o3]
    confidence_threshold: 0.95

budget:
  default_per_query: 0.05

domains:
  code:        [ollama/qwen2.5-coder, claude-sonnet, gpt-4o]
  finance:     [claude-opus, o3, gemini-pro]
  architecture:[claude-sonnet, gpt-4o, ollama/llama3.2]
  legal:       [claude-opus, gpt-4o]
  creative:    [claude-sonnet, gpt-4o-mini, ollama/llama3.2]
  factual:     [ollama/llama3.2, gemini-flash]

personas:
  code:         "You are a senior software engineer. Prefer concise, correct code with minimal commentary."
  finance:      "You are a careful quantitative analyst. Show your reasoning and flag assumptions."
  architecture: "You are a principal systems architect. Weigh trade-offs explicitly."
  legal:        "You are a meticulous legal analyst. Cite jurisdiction and flag uncertainty."
  creative:     "You are a strong creative writer. Be vivid and original."
  factual:      "You are a precise fact-checker. Cite sources where possible and flag uncertainty."
  default:      "You are a careful expert. Be precise and flag uncertainty."

# Per-model pricing (USD per 1k tokens, input/output). Used for budget enforcement.
pricing:
  ollama/llama3.2:        { input: 0.0, output: 0.0 }
  ollama/qwen2.5-coder:   { input: 0.0, output: 0.0 }
  gemini-flash:           { input: 0.00035, output: 0.00105 }
  gemini-pro:             { input: 0.00125, output: 0.005 }
  gpt-4o-mini:            { input: 0.00015, output: 0.0006 }
  gpt-4o:                 { input: 0.005, output: 0.015 }
  o3:                     { input: 0.015, output: 0.06 }
  claude-sonnet:          { input: 0.003, output: 0.015 }
  claude-opus:            { input: 0.015, output: 0.075 }
  claude-opus-4:          { input: 0.015, output: 0.075 }
