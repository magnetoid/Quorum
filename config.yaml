tiers:
  local:
    models:
    - ollama/llama3.2
    - ollama/qwen2.5-coder
    confidence_threshold: 0.75
  cheap:
    models:
    - gemini-flash
    - gpt-4o-mini
    confidence_threshold: 0.85
  premium:
    models:
    - claude-opus-4
    - o3
    confidence_threshold: 0.95
budget:
  default_per_query: 0.05
# Each domain's allow-list must use the SAME model names as the tiers above:
# the engine runs a model only if it appears in BOTH the domain list and a tier
# (tier ∩ domain). Every domain therefore spans multiple tiers and includes the
# two free local models so a real council convenes even with no API keys.
domains:
  code:
  - ollama/qwen2.5-coder
  - ollama/llama3.2
  - gpt-4o-mini
  - claude-opus-4
  finance:
  - ollama/llama3.2
  - gpt-4o-mini
  - claude-opus-4
  - o3
  architecture:
  - ollama/llama3.2
  - ollama/qwen2.5-coder
  - gpt-4o-mini
  - claude-opus-4
  legal:
  - ollama/llama3.2
  - gpt-4o-mini
  - claude-opus-4
  - o3
  creative:
  - ollama/llama3.2
  - ollama/qwen2.5-coder
  - gemini-flash
  - claude-opus-4
  factual:
  - ollama/llama3.2
  - ollama/qwen2.5-coder
  - gemini-flash
  - gpt-4o-mini
personas:
  code: You are a senior software engineer. Prefer concise, correct code with minimal
    commentary.
  finance: You are a careful quantitative analyst. Show your reasoning and flag assumptions.
  architecture: You are a principal systems architect. Weigh trade-offs explicitly.
  legal: You are a meticulous legal analyst. Cite jurisdiction and flag uncertainty.
  creative: You are a strong creative writer. Be vivid and original.
  factual: You are a precise fact-checker. Cite sources where possible and flag uncertainty.
  default: You are a careful expert. Be precise and flag uncertainty.
# Pricing keys must match the model names used in tiers/domains exactly; an
# unmatched name silently costs $0 (the adapter falls back to 0.0). These are
# the names actually referenced above.
pricing:
  ollama/llama3.2:
    input: 0.0
    output: 0.0
  ollama/qwen2.5-coder:
    input: 0.0
    output: 0.0
  gemini-flash:
    input: 0.00035
    output: 0.00105
  gpt-4o-mini:
    input: 0.00015
    output: 0.0006
  claude-opus-4:
    input: 0.015
    output: 0.075
  o3:
    input: 0.015
    output: 0.06
voting:
  cluster_threshold: 0.25
  dispute_confidence: 0.66
providers:
  ollama:
    enabled: true
    api_key_env: null
  anthropic:
    enabled: true
    api_key_env: ANTHROPIC_API_KEY
  openai:
    enabled: true
    api_key_env: OPENAI_API_KEY
  openrouter:
    enabled: true
    api_key_env: OPENROUTER_API_KEY
  gemini:
    enabled: false
    api_key_env: GEMINI_API_KEY
  cohere:
    enabled: false
    api_key_env: COHERE_API_KEY
  groq:
    enabled: false
    api_key_env: GROQ_API_KEY
  together:
    enabled: false
    api_key_env: TOGETHER_API_KEY
  deepseek:
    enabled: false
    api_key_env: DEEPSEEK_API_KEY
  fireworks:
    enabled: false
    api_key_env: FIREWORKS_API_KEY
  mistral:
    enabled: false
    api_key_env: MISTRAL_API_KEY
  xai:
    enabled: false
    api_key_env: XAI_API_KEY
  perplexity:
    enabled: false
    api_key_env: PERPLEXITY_API_KEY
  anyscale:
    enabled: false
    api_key_env: ANYSCALE_API_KEY
  cerebras:
    enabled: false
    api_key_env: CEREBRAS_API_KEY
  hf:
    enabled: false
    api_key_env: HF_API_KEY
  azure:
    enabled: false
    api_key_env: AZURE_OPENAI_API_KEY
    base_url: https://YOUR-RESOURCE.openai.azure.com/openai/v1
